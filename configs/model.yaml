# Model configuration
model:
  architecture: "ST-MHGTD"
  patch_size: 6
  stride: 3
  dilation_rates: [1, 2, 4, 8]
  hidden_dim: 128
  num_layers: 4
  dropout: 0.1
  quantiles: [0.05, 0.5, 0.95]
  
training:
  seed: 42
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 100
  early_stopping_patience: 10
  gradient_clip: 1.0
  export_format: "onnx"
